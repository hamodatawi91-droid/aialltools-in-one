    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-[#0B0F19] text-gray-100 font-sans selection:bg-purple-600">

    <header class="border-b border-gray-800 bg-[#0F1524] sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 p-2.5 rounded-xl"><i class="fas fa-sparkles text-white text-xl"></i></div>
                <div>
                    <h1 class="text-2xl font-black bg-gradient-to-r from-white to-purple-400 bg-clip-text text-transparent">Aialltools in one</h1>
                    <p class="text-xs text-gray-400">الدليل المقسم لأدوات الذكاء الاصطناعي 2026</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <a href="https://t.me/ASSHQARR" target="_blank" class="block mb-10 p-4 bg-[#121B2E] border border-dashed border-purple-500/30 rounded-2xl text-center group hover:border-purple-500/60 transition-all">
            <span class="text-[10px] text-purple-400 font-bold block mb-1">★ مساحة راعية متميزة ★</span>
            <h3 class="text-sm font-bold text-white group-hover:text-purple-300">هل تملك أداة ذكاء اصطناعي؟ اعلن هنا لتصل لآلاف الزوار</h3>
            <p class="text-xs text-gray-400 mt-1"><i class="fab fa-telegram-plane ml-1"></i> اضغط للتواصل الفوري عبر تليجرام لحجز الإعلان</p>
        </a>

        <div class="bg-[#0F1524] border border-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="lg:col-span-2">
                    <input type="text" id="searchInput" onInput="filterTools()" placeholder="ابحث عن أدوات (صور، برومبت، فاشن، صوت)..." class="w-full bg-[#151D30] border border-gray-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition-all placeholder-gray-500">
                </div>
                <div>
                    <select id="pricingFilter" onchange="filterTools()" class="w-full bg-[#151D30] border border-gray-700 rounded-xl px-3 py-3 text-sm text-gray-300 focus:outline-none cursor-pointer">
                        <option value="all">كل خيارات التسعير</option>
                        <option value="free">مجاني بالكامل (Free)</option>
                        <option value="freemium">خيارين (Freemium)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-6 px-2"><p class="text-sm text-gray-400">العدد المتاح حالياً: <span id="toolsCount" class="text-purple-400 font-black text-base">0</span> أداة مصنفة</p></div>
        <div id="categoriesContainer" class="space-y-16"></div>
    </main>

    <script>
        const CATS = {
            "fsh": { n: "تكنولوجيا الفاشن وتصميم الأزياء", i: "fa-shirt" },
            "img": { n: "توليد الصور والبرومبتات الجاهزة", i: "fa-image" },
            "mkt": { n: "التصميم الإعلاني وتصوير المنتجات", i: "fa-rectangle-ad" },
            "vid": { n: "إنتاج الفيديو والسينما والمؤثرات", i: "fa-video" },
            "aud": { n: "الهندسة الصوتية والموسيقى", i: "fa-music" },
            "shrt": { n: "صناعة محتوى Shorts و TikTok", i: "fa-clapperboard" },
            "cod": { n: "البرمجة الذكية وبناء المواقع", i: "fa-code" }
        };

        const TOOLS = [
            { c: "fsh", n: "Lalaland AI", p: "freemium", b: "عارضي أزياء", u: "https://lalaland.ai", d: "توليد عارضي أزياء مخصصين رقمياً لتوفير تكاليف التصوير الفوتوغرافي الحقيقي." },
            { c: "fsh", n: "Zmo AI", p: "freemium", b: "جلسات تصوير", u: "https://www.zmo.ai", d: "تحويل صور الملابس المعلقة إلى جلسات تصوير احترافية على عارضين حقيقيين." },
            { c: "fsh", n: "The New Black", p: "freemium", b: "أفكار أزياء", u: "https://thenewblack.ai", d: "توليد تصاميم ملابس مبتكرة فريدة من الأوامر النصية لمصممي الأزياء." },
            { c: "img", n: "Lexica Art", p: "free", b: "مكتبة برومبتات", u: "https://lexica.art", d: "أضخم محرك بحث ومكتبة لصور الذكاء الاصطناعي؛ تصفح الصور واقتبس الأوامر النصية (البرومبت) الدقيقة التي أنتجتها بضغطة زر." },
            { c: "img", n: "PromptHero", p: "free", b: "محرك بحث برومبت", u: "https://prompthero.com", d: "أكبر محرك بحث في العالم لاكتشاف أفضل البرومبتات المجربة والمحسنة عالمياً لمولدات الصور." },
            { c: "img", n: "Flux.1 Schnell", p: "free", b: "مجاني بالكامل", u: "https://blackforestlabs.ai", d: "توليد صور فائقة الواقعية واللافتات النصية بدقة إملائية مذهلة وبدون تشويه." },
            { c: "img", n: "Midjourney v6", p: "premium", b: "جودة حادة", u: "https://midjourney.com", d: "الأداة الأشهر عالمياً لإنتاج تصاميم سينمائية ولوحات فنية من البرومبت النصي." },
            { c: "img", n: "Stable Diffusion", p: "free", b: "مفتوح المصدر", u: "https://stability.ai", d: "نموذج قوي ومجاني لتوليد الصور والتحكم المطلق في تفاصيل الإضاءة والوجوه للبراندات." },
            { c: "mkt", n: "Flair AI", p: "freemium", b: "تصوير منتجات", u: "https://flair.ai", d: "تركيب وتصوير المنتجات إعلانياً بدمج عناصر الديكور وإضاءتها تلقائياً كاستوديو حقيقي." },
            { c: "mkt", n: "Pebblely AI", p: "freemium", b: "خلفيات إعلانية", u: "https://pebblely.com", d: "تحويل صور المنتجات العادية للقطات تسويقية فاخرة مع 40 صورة مجانية شهرياً." },
            { c: "mkt", n: "Photoroom AI", p: "freemium", b: "بوسترات سريعة", u: "https://photoroom.com", d: "إزالة خلفيات الصور بدقة فائقة وتوليد بوسترات تسويقية جاهزة لمنصات إنستغرام وتيك توك." },
            { c: "mkt", n: "Microsoft Designer", p: "free", b: "بوسترات مجانية", u: "https://designer.microsoft.com", d: "أداة من مايكروسوفت لإنشاء تصميمات وبوسترات إعلانية تدمج بين الصور والنصوص التسويقية." },
            { c: "vid", n: "Google Lumiere", p: "free", b: "فيديو متقدم", u: "https://research.google", d: "نموذج رائد من جوجل لإنتاج فيديوهات سينمائية انسيابية فائقة الواقعية." },
            { c: "vid", n: "Luma Machine", p: "freemium", b: "فيديو حركي", u: "https://lumalabs.ai", d: "توليد لقطات حركية سينمائية مدتها 5 ثوانٍ من الصور أو النصوص بفهم عميق لحركة الكاميرا." },
            { c: "vid", n: "Kling AI", p: "freemium", b: "حركات فيزيائية", u: "https://klingai.com", d: "عملاق إنتاج الفيديو بحركات جسدية فائقة الواقعية للمشاهد الطويلة والنقية يومياً." },
            { c: "vid", n: "Runway Gen-3", p: "freemium", b: "سينمائي محترف", u: "https://runwayml.com", d: "الخيار الأول لصناع الأفلام والمحتوى لإنتاج مؤثرات بصرية وفيديوهات واقعية مذهلة." },
            { c: "aud", n: "Adobe Podcast", p: "freemium", b: "تنقية الاستوديو", u: "https://podcast.adobe.com", d: "تنقية التسجيلات الصوتية الضعيفة تماماً من التشويش والصدى لتبدو بجودة استوديو احترافي." },
            { c: "aud", n: "Suno AI", p: "freemium", b: "صناعة موسيقى", u: "https://suno.com", d: "توليد أغانٍ ومقاطع موسيقية متكاملة بجودة عالية من الكلمات والأوامر النصية." },
            { c: "aud", n: "Udio AI", p: "freemium", b: "توزيع سينمائي", u: "https://udio.com", d: "إنتاج وتوزيع موسيقي احترافي وسينمائي مبهر يمتاز بنقاء صوتي فائق الدقة." },
            { c: "shrt", n: "Opus Clip", p: "freemium", b: "تقطيع ذكي", u: "https://opus.pro", d: "تحويل الفيديوهات الطويلة لمقاطع Shorts عمودية فيرال جاهزة بالترجمة التلقائية الذكية." },
            { c: "shrt", n: "CapCut Web", p: "free", b: "مونتاج سحابي", u: "https://capcut.com", d: "تحتوي على الترجمة العربية التلقائية وتوليد الفيديوهات السريعة وتحسين المقاسات." },
            { c: "shrt", n: "Klap", p: "freemium", b: "شورتس بضغطة", u: "https://klap.app", d: "استخراج اللقطات الأكثر إثارة من روابط يوتيوب الطويلة وتحويلها لمقاطع قصيرة بالترجمة." },
            { c: "cod", n: "v0 by Vercel", p: "freemium", b: "واجهات فورية", u: "https://v0.dev", d: "توليد الكود البرمجي الكامل والواجهات الأنيقة للمتاجر والمواقع بمجرد وصفها نصياً." },
            { c: "cod", n: "Bolt.new", p: "freemium", b: "تطبيقات بالمتصفح", u: "https://bolt.new", d: "بناء وتشغيل وتثبيت مواقع ويب وتطبيقات متكاملة من الصفر عبر متصفحك بالشات البرمجي." }
        ];

        function renderDashboard(list) {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            document.getElementById('toolsCount').innerText = list.length;
            const grouped = {};
            Object.keys(CATS).forEach(c => grouped[c] = []);
            list.forEach(t => { if(grouped[t.c]) grouped[t.c].push(t); });
            Object.keys(CATS).forEach(catId => {
                const catTools = grouped[catId];
                if(catTools.length > 0) {
                    let html = `<div class="pt-6 border-t border-gray-800/60"><h2 class="text-lg font-black text-white mb-6 flex items-center gap-2"><span class="bg-purple-600/10 border border-purple-500/30 p-2 rounded-xl text-purple-400"><i class="fas ${CATS[catId].i}"></i></span>${CATS[catId].n}</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                    catTools.forEach(t => {
                        html += `<div class="bg-[#0F1524] border border-gray-800 rounded-2xl p-6 flex flex-col justify-between hover:border-purple-500/40 transition-all relative overflow-hidden"><div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r ${t.p === 'free' ? 'from-green-500 to-emerald-400' : 'from-purple-500 to-indigo-500'}"></div><div><div class="flex items-start justify-between mb-3"><h3 class="text-md font-bold text-white">${t.n}</h3><span class="text-[10px] font-bold px-2 py-0.5 rounded ${t.p === 'free' ? 'bg-green-500/10 text-green-400' : 'bg-purple-500/10 text-purple-400'}">${t.b}</span></div><p class="text-gray-400 text-xs leading-relaxed mb-4 text-justify">${t.d}</p></div><div class="border-t border-gray-800/40 pt-4 flex items-center justify-between mt-auto"><span class="text-[10px] text-gray-500">🌐 رابط مباشر</span><a href="${t.u}" target="_blank" class="bg-[#151D30] text-gray-300 hover:bg-[#1A243C] text-xs font-bold px-4 py-2 rounded-xl border border-gray-700/50">زيارة الموقع</a></div></div>`;
                    });
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            });
        }
        function filterTools() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const p = document.getElementById('pricingFilter').value;
            renderDashboard(TOOLS.filter(t => (t.n.toLowerCase().includes(q) || t.d.toLowerCase().includes(q)) && (p === 'all' || t.p === p)));
        }
        renderDashboard(TOOLS);
    </script>
</body>
</html>
