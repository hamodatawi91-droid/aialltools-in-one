<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aialltools in one</title>
    <!-- استدعاء الأيقونات والتصميم الفاخر -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-[#0B0F19] text-gray-100 font-sans selection:bg-purple-600 selection:text-white">

    <!-- هيدر الموقع الفاخر -->
    <header class="border-b border-gray-800 bg-[#0F1524] sticky top-0 z-50 backdrop-blur-md bg-opacity-80">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 p-2.5 rounded-xl shadow-lg shadow-purple-500/20">
                    <i class="fas fa-sparkles text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-white via-gray-200 to-purple-400 bg-clip-text text-transparent">
                        Aialltools in one
                    </h1>
                    <p class="text-xs text-gray-400 font-medium">المحرك والدليل الشامل لأدوات الذكاء الاصطناعي</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-4 text-sm text-gray-400">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> تحديث تلقائي 2026</span>
                <span class="bg-purple-600/10 border border-purple-500/20 px-3 py-1 rounded-full text-xs text-purple-400 font-bold">النسخة الاحترافية النهائية</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- مساحة إعلانية علوية مثبتة -->
        <div class="mb-10 p-4 bg-[#121B2E] border border-dashed border-purple-500/30 rounded-2xl flex flex-col items-center justify-center text-center group hover:border-purple-500/60 transition-all cursor-pointer">
            <span class="text-[10px] text-purple-400 uppercase tracking-widest mb-1 font-bold">★ مساحة راعية متميزة ★</span>
            <h3 className="text-sm font-bold text-white">هل تملك أداة ذكاء اصطناعي جديدة؟ اعلن هنا لتصل لآلاف الزوار يومياً</h3>
            <p class="text-xs text-gray-400 mt-1">تواصل معنا لحجز مساحتك الإعلانية المتميزة</p>
        </div>

        <!-- شريط البحث وفلاتر التحكم السريعة -->
        <div class="bg-[#0F1524] border border-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <div class="relative lg:col-span-2">
                    <input
                        type="text"
                        id="searchInput"
                        onInput="filterTools()"
                        placeholder="ابحث عن أداة أو وظيفة معينة (مثال: فاشن، مسح خلفية، برومبت، فيديو، شورتس)..."
                        class="w-full bg-[#151D30] border border-gray-700/60 rounded-xl pr-4 pl-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white transition-all placeholder-gray-500"
                    >
                </div>
                <div class="flex items-center gap-2 bg-[#151D30] border border-gray-700/60 rounded-xl px-3 py-1.5">
                    <select 
                        id="pricingFilter"
                        onchange="filterTools()"
                        class="bg-transparent w-full text-sm text-gray-300 focus:outline-none cursor-pointer"
                    >
                        <option value="all" class="bg-[#151D30]">كل خيارات التسعير</option>
                        <option value="free" class="bg-[#151D30]">مجاني بالكامل (100% Free)</option>
                        <option value="freemium" class="bg-[#151D30]">خيارين (Freemium)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- شبكة عرض بطاقات الأدوات -->
        <div id="toolsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- سيتم توليد البطاقات تلقائياً هنا عبر الجافاسكريبت -->
        </div>

    </main>

    <footer class="border-t border-gray-800 bg-[#0F1524] mt-20 py-8 text-center text-xs text-gray-500">
        <p>© 2026 جميع الحقوق محفوظة لمنصة <span class="text-gray-300 font-bold">Aialltools in one</span></p>
    </footer>

    <!-- محرك التشغيل الذكي والبيانات المدمجة -->
    <script>
        const TOOLS = [
            { name: "Lalaland AI", pricing: "freemium", badge: "خيارين", url: "https://lalaland.ai", description: "المنصة الرائدة عالمياً لتوليد عارضي أزياء مخصصين بالكامل لتلبيسهم ملابسك الرقمية وتوفير تكاليف جلسات التصوير الحقيقية للبراند." },
            { name: "Zmo AI (Fashion Model)", pricing: "freemium", badge: "خيارين", url: "https://www.zmo.ai", description: "ارفع صورة قطعة الملابس وهي معلقة، واصنع جلسة تصوير احترافية على عارضي أزياء حقيقيين وفي خلفيات سينمائية جاهزة للسوشيال ميديا." },
            { name: "The New Black", pricing: "freemium", badge: "خيارين", url: "https://www.thenewblack.ai", description: "مصمم خصيصاً لمصممي الأزياء والبراندات الناشئة لتوليد أفكار ملابس فريدة وحقائب من الأوامر النصية فقط." },
            { name: "Flux.1 (Schnell)", pricing: "free", badge: "مجاني بالكامل", url: "https://blackforestlabs.ai", description: "أحدث وأقوى نموذج لتوليد الصور. يتميز بقدرته الخارقة على كتابة النصوص واللافتات الإعلانية داخل الصور بدقة إملائية مذهلة." },
            { name: "Flair AI", pricing: "freemium", badge: "خيارين", url: "https://flair.ai", description: "أداة تصوير المنتجات الإعلانية الأولى؛ اسحب وأفلت عناصر الديكور المحيطة بمنتجك ليقوم النظام بدمجها وإضاءتها كأنها في استوديو حقيقي." },
            { name: "Luma Dream Machine", pricing: "freemium", badge: "خيارين", url: "https://lumalabs.ai/dream-machine", description: "يولد فيديوهات سينمائية حركية واقعية مدتها 5 ثوانٍ من النصوص أو الصور مع فهم فيزيائي عميق لحركات الكاميرا." },
            { name: "Kling AI", pricing: "freemium", badge: "خيارين", url: "https://klingai.com", description: "عملاق توليد الفيديو الذي يعطي نقاطاً مجانية يومية، ويمتاز بقدرته الفائقة على إنتاج حركات جسدية معقدة ومشاهد سينمائية نقية." },
            { name: "Opus Clip", pricing: "freemium", badge: "خيارين", url: "https://www.opus.pro", description: "أداة خرافية تأخذ الفيديوهات الطويلة من يوتيوب وتقوم بتقطيعها تلقائياً بالذكاء الاصطناعي لتستخرج أفضل مقاطع Shorts جاهزة بالترجمة." },
            { name: "RMBG 1.4 Background Remover", pricing: "free", badge: "مدمج ومجاني", url: "#", description: "أداة مدمجة؛ نموذج ذكاء اصطناعي فائق السرعة لإزالة خلفيات الصور بدقة مذهلة خلال أقل من ثانيتين وبشكل مجاني وغير محدود." }
        ];

        function renderTools(toolsList) {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';
            toolsList.forEach(tool => {
                grid.innerHTML += `
                    <div class="bg-[#0F1524] border border-gray-800 rounded-2xl p-6 flex flex-col justify-between hover:border-purple-500/40 transition-all relative overflow-hidden">
                        <div class="absolute top-0 left-0 right-0 h-[2px] ${tool.pricing === 'free' ? 'bg-green-500' : 'bg-purple-500'}"></div>
                        <div>
                            <div class="flex items-start justify-between mb-4">
                                <h3 class="text-md font-bold text-white">${tool.name}</h3>
                                <span class="text-[10px] font-bold px-2.5 py-1 rounded-md ${tool.pricing === 'free' ? 'bg-green-500/10 text-green-400' : 'bg-purple-500/10 text-purple-400'}">${tool.badge}</span>
                            </div>
                            <p class="text-gray-400 text-xs leading-relaxed mb-6">${tool.description}</p>
                        </div>
                        <div class="border-t border-gray-800/60 pt-4 flex items-center justify-between mt-auto">
                            <span class="text-[10px] text-gray-500">🌐 رابط مباشر</span>
                            <a href="${tool.url}" target="_blank" class="bg-[#151D30] text-gray-300 hover:bg-[#1A243C] text-xs font-bold px-4 py-2 rounded-xl border border-gray-700/50">زيارة الموقع</a>
                        </div>
                    </div>
                `;
            });
        }

        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const pricing = document.getElementById('pricingFilter').value;
            const filtered = TOOLS.filter(tool => {
                const matchesSearch = tool.name.toLowerCase().includes(query) || tool.description.toLowerCase().includes(query);
                const matchesPricing = pricing === 'all' || tool.pricing === pricing;
                return matchesSearch && matchesPricing;
            });
            renderTools(filtered);
        }

        // تشغيل أولي لعرض الأدوات فوراً
        renderTools(TOOLS);
    </script>
</body>
</html>
